services:
  train:
    build: .
    container_name: rfdetr-iteracija2
    working_dir: /data/RT-DETR/iteracija2
    volumes:
      - ../../:/data
    command: python train.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "16g"
